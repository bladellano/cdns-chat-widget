<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suporte Técnico - Chat Widget</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      color: white;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 20px; opacity: 0.9; }
    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 40px;
      background: #2196f3;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>💼 Suporte Técnico</h1>
    <p>Estamos aqui para ajudá-lo com qualquer problema técnico!</p>
    <a href="#" class="btn" onclick="CdnsChat.open(); return false;">Falar com Suporte</a>
  </div>

  <script>
    window.CdnsChatConfig = {
      serverUrl: 'http://localhost:3000',
      webhookId: '9f6af178-6821-49c6-a041-6a4419aeb628',
      position: 'bottom-right',
      primaryColor: '#2196f3',
      botName: 'Suporte Técnico',
      welcomeMessage: 'Olá! Como podemos ajudá-lo hoje?',
      placeholder: 'Descreva seu problema...',
      buttonIcon: '🛠️'
    };
  </script>
  <script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script src="http://localhost:3000/widget.js"></script>
</body>
</html>
